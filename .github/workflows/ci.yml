name: CI
on: [push, pull_request]

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Dependencies
        run: uv sync

      - name: Cache binary tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/iscc-sdk
            ~/Library/Application Support/iscc-sdk
            ~/AppData/Local/iscc/iscc-sdk
          key: iscc-tools-${{ runner.os }}-${{ hashFiles('iscc_sdk/tools.py') }}

      - name: Install binary tools
        run: uv run idk install

      - name: Run Tests
        run: uv run pytest --cov=iscc_sdk --cov-report=xml -v tests

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Install Optional Semantic Code Packages
        run: uv sync --all-extras

      - name: Run Semantic Code Tests
        run: uv run pytest --cov=iscc_sdk --cov-report=xml -v tests/test_semantic.py

  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'python' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}

    - name: Autobuild
      uses: github/codeql-action/autobuild@v4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
